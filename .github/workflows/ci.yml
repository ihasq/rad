name: Rad CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: oven-sh/setup-bun@v2
      - name: Build Rust
        run: cd rust && cargo build --release
      - name: Build WASM
        run: cd rust && cargo build -p rad-wasm --target wasm32-unknown-unknown --release
      - name: Build TypeScript (includes WASM copy)
        run: cd ts && bun install && bash build.sh
      - name: Debug relay
        run: |
          echo "=== WASM file ==="
          ls -lh ts/dist/rad_wasm.wasm 2>&1 || echo "WASM NOT FOUND"
          ls -lh rust/target/wasm32-unknown-unknown/release/rad_wasm.wasm 2>&1 || echo "WASM NOT FOUND in rust target"
          echo "=== TS binary ==="
          ls -lh ts/dist/rad 2>&1 || echo "TS binary NOT FOUND"
          echo "=== Test t015 verbose (last 30 lines) ==="
          RUST_BIN=$(readlink -f rust/target/release/rad)
          TS_BIN=$(readlink -f ts/dist/rad)
          bash -x tests/t015_relay.sh $RUST_BIN $TS_BIN 2>&1 | tail -30
          echo "EXIT: $?"
      - name: Run shared tests
        run: bash tests/runner.sh
