name: Rad CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: oven-sh/setup-bun@v2
      - name: Build Rust
        run: cd rust && cargo build --release
      - name: Build WASM
        run: cd rust && cargo build -p rad-wasm --target wasm32-unknown-unknown --release
      - name: Build TypeScript (includes WASM copy)
        run: cd ts && bun install && bash build.sh
      - name: Debug relay
        run: |
          RUST_BIN=$(readlink -f rust/target/release/rad)
          TS_BIN=$(readlink -f ts/dist/rad)
          WASM_PATH=$(readlink -f ts/dist/rad_wasm.wasm)

          # Relay 起動
          $TS_BIN relay --port 18999 --wasm $WASM_PATH &
          sleep 3

          # join
          curl -s -X POST http://localhost:18999/rad/participants \
            -H 'Content-Type: application/json' \
            -d '{"publicKey":"testkey","displayName":"alice"}'
          echo ""

          # write（署名なしで400の内容を確認）
          echo '=== write response body ==='
          curl -s -X POST http://localhost:18999/rad/operations \
            -H 'Content-Type: application/json' \
            -d '{"participantId":"p-0","type":"write","regionId":"main.ts:1-10","content":"hello","signature":"dummy"}'
          echo ""

          # write（署名付きで確認）
          KEYS=$($RUST_BIN keygen)
          SEC=$(echo "$KEYS" | sed -n '2p' | awk '{print $2}')
          OP='{"content":"hello","participantId":"p-0","regionId":"main.ts:1-10","type":"write"}'
          SIGNED=$(echo "$OP" | $RUST_BIN sign --secret-key "$SEC")
          echo '=== signed write response ==='
          curl -s -w '\nHTTP_STATUS:%{http_code}' -X POST http://localhost:18999/rad/operations \
            -H 'Content-Type: application/json' \
            -d "$SIGNED"
          echo ""

          kill %1 2>/dev/null
      - name: Run shared tests
        run: bash tests/runner.sh
