name: Rad CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: oven-sh/setup-bun@v2
      - name: Build Rust
        run: cd rust && cargo build --release
      - name: Build WASM
        run: cd rust && cargo build -p rad-wasm --target wasm32-unknown-unknown --release
      - name: Build TypeScript (includes WASM copy)
        run: cd ts && bun install && bash build.sh
      - name: Debug relay
        run: |
          RUST_BIN=$(readlink -f rust/target/release/rad)
          TS_BIN=$(readlink -f ts/dist/rad)
          WASM_PATH=$(readlink -f ts/dist/rad_wasm.wasm)

          # 鍵ペア生成（JOIN と署名で同一鍵を使用）
          KEYS=$($RUST_BIN keygen)
          PUB=$(echo "$KEYS" | head -1 | awk '{print $2}')
          SEC=$(echo "$KEYS" | sed -n '2p' | awk '{print $2}')
          echo "Generated keys - Public: $PUB"

          # Relay 起動
          $TS_BIN relay --port 18999 --wasm $WASM_PATH &
          sleep 3

          # join（生成した公開鍵を使用）
          echo '=== join ==='
          curl -s -X POST http://localhost:18999/rad/participants \
            -H 'Content-Type: application/json' \
            -d "{\"publicKey\":\"$PUB\",\"displayName\":\"alice\"}"
          echo ""

          # write（署名なしで403確認）
          echo '=== write unsigned (expect 403) ==='
          curl -s -w '\nHTTP:%{http_code}\n' -X POST http://localhost:18999/rad/operations \
            -H 'Content-Type: application/json' \
            -d '{"participantId":"p-0","type":"write","regionId":"main.ts:1-10","content":"hello","signature":"dummy"}'
          echo ""

          # write（署名付きで201確認）
          OP='{"content":"hello","participantId":"p-0","regionId":"main.ts:1-10","type":"write"}'
          SIGNED=$(echo "$OP" | $RUST_BIN sign --secret-key "$SEC")
          echo '=== write signed (expect 201) ==='
          echo "Payload: $SIGNED"
          curl -s -w '\nHTTP:%{http_code}\n' -X POST http://localhost:18999/rad/operations \
            -H 'Content-Type: application/json' \
            -d "$SIGNED"
          echo ""

          kill %1 2>/dev/null
      - name: Run t015 with verbose output
        run: |
          RUST=$(readlink -f rust/target/release/rad)
          TS=$(readlink -f ts/dist/rad)
          bash -x tests/t015_relay.sh "$RUST" "$TS" 2>&1 | tail -100
          echo "t015 EXIT CODE: $?"
      - name: Run shared tests
        run: bash tests/runner.sh
