name: Rad CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Build Rust
        run: cd rust && cargo build --release
      - name: Build WASM
        run: cd rust && cargo build -p rad-wasm --target wasm32-unknown-unknown --release
      - name: Copy WASM to TypeScript directory
        run: cp rust/target/wasm32-unknown-unknown/release/rad_wasm.wasm ts/
      - name: Build TypeScript
        run: cd ts && bun install && bash build.sh
      - name: Run shared tests
        run: bash tests/runner.sh
